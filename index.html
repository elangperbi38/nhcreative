<body class="selection:bg-softGold selection:text-dark">

    <div id="dev-warning">
        <h1 class="text-5xl mb-4">Access Restricted</h1>
        <p class="font-sans text-cream text-lg">Developer tools inspection is locked on this premium experience.</p>
        <div class="mt-8 w-16 h-px bg-softGold"></div>
    </div>

    <div class="noise-bg"></div>
    <div id="canvas-container"></div>
    <div id="root"></div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault());
        
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || 
               (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
               (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                showDevWarning();
            }
        });

        function showDevWarning() {
            const warning = document.getElementById('dev-warning');
            warning.style.display = 'flex';
            setTimeout(() => { warning.style.display = 'none'; }, 4000);
        }
    </script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useLayoutEffect, useCallback, createContext, useContext } from 'react';
        import { createRoot } from 'react-dom/client';
        import { createPortal } from 'react-dom';
        import { motion, AnimatePresence, useScroll, useTransform, useSpring, useInView } from 'framer-motion';

        const ThemeContext = createContext();

        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.oscillator = null;
                this.gainNode = null;
                this.filter = null;
                this.isPlaying = false;
                this.lfo = null;
            }

            init() {
                if(this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                this.oscillator = this.ctx.createOscillator();
                this.oscillator.type = 'triangle';
                this.oscillator.frequency.value = 60;

                this.filter = this.ctx.createBiquadFilter();
                this.filter.type = 'lowpass';
                this.filter.frequency.value = 300;

                this.lfo = this.ctx.createOscillator();
                this.lfo.type = 'sine';
                this.lfo.frequency.value = 0.1; 
                const lfoGain = this.ctx.createGain();
                lfoGain.gain.value = 100;
                
                this.lfo.connect(lfoGain);
                lfoGain.connect(this.filter.frequency);

                this.gainNode = this.ctx.createGain();
                this.gainNode.gain.value = 0;

                this.oscillator.connect(this.filter);
                this.filter.connect(this.gainNode);
                this.gainNode.connect(this.ctx.destination);

                this.oscillator.start();
                this.lfo.start();
            }

            toggle() {
                if(!this.ctx) this.init();
                
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }

                if(this.isPlaying) {
                    this.gainNode.gain.setTargetAtTime(0, this.ctx.currentTime, 1);
                } else {
                    this.gainNode.gain.setTargetAtTime(0.2, this.ctx.currentTime, 2);
                }
                this.isPlaying = !this.isPlaying;
                return this.isPlaying;
            }
        }

        const audioEngine = new AudioEngine();

        let threeScene, threeRenderer, threeParticlesMat, threeAmbientLight, threePointLight;

        const initThreeJS = () => {
            const container = document.getElementById('canvas-container');
            if(!container) return;
            container.innerHTML = '';

            threeScene = new THREE.Scene();
            threeScene.fog = new THREE.FogExp2(0x0a0a0a, 0.001);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            threeRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, powerPreference: "high-performance" });
            
            threeRenderer.setSize(window.innerWidth, window.innerHeight);
            threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(threeRenderer.domElement);

            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 1500;
            const posArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 35; 
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            threeParticlesMat = new THREE.PointsMaterial({
                size: 0.015,
                color: 0xD4AF37,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(particlesGeometry, threeParticlesMat);
            threeScene.add(particlesMesh);

            const objects = [];
            const geoTypes = [
                new THREE.IcosahedronGeometry(1.5, 0),
                new THREE.OctahedronGeometry(1.2, 0),
                new THREE.TorusGeometry(1, 0.02, 16, 100)
            ];
            
            const objMat = new THREE.MeshStandardMaterial({
                color: 0x8B5A2B,
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });

            for(let i=0; i<6; i++) {
                const geo = geoTypes[Math.floor(Math.random() * geoTypes.length)];
                const mesh = new THREE.Mesh(geo, objMat);
                mesh.position.set(
                    (Math.random() - 0.5) * 25,
                    (Math.random() - 0.5) * 25,
                    (Math.random() - 0.5) * 15 - 5
                );
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                threeScene.add(mesh);
                objects.push({
                    mesh,
                    rotSpeed: { x: (Math.random() - 0.5) * 0.002, y: (Math.random() - 0.5) * 0.002 },
                    initialY: mesh.position.y,
                    floatSpeed: Math.random() * 2 + 1.5
                });
            }

            threeAmbientLight = new THREE.AmbientLight(0xffffff, 0.3);
            threeScene.add(threeAmbientLight);
            
            threePointLight = new THREE.PointLight(0xD4AF37, 2, 50);
            threePointLight.position.set(5, 5, 5);
            threeScene.add(threePointLight);

            camera.position.z = 7;

            let mouseX = 0, mouseY = 0;
            let targetX = 0, targetY = 0;
            const windowHalfX = window.innerWidth / 2;
            const windowHalfY = window.innerHeight / 2;

            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX - windowHalfX);
                mouseY = (event.clientY - windowHalfY);
            });

            let scrollY = window.scrollY;
            window.addEventListener('scroll', () => { scrollY = window.scrollY; });

            const clock = new THREE.Clock();

            const animate = () => {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();

                targetX = mouseX * 0.0005;
                targetY = mouseY * 0.0005;

                particlesMesh.rotation.y += 0.0002;
                particlesMesh.rotation.x += 0.0001;
                
                camera.position.x += (targetX - camera.position.x) * 0.05;
                camera.position.y += (-targetY - (scrollY * 0.001) - camera.position.y) * 0.05;
                camera.lookAt(threeScene.position);

                objects.forEach((obj, i) => {
                    obj.mesh.rotation.x += obj.rotSpeed.x;
                    obj.mesh.rotation.y += obj.rotSpeed.y;
                    obj.mesh.position.y = obj.initialY + Math.sin(elapsedTime / obj.floatSpeed + i) * 0.6;
                });

                threeRenderer.render(threeScene, camera);
            };

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                threeRenderer.setSize(window.innerWidth, window.innerHeight);
            });
        };

        const updateThreeTheme = (isDark) => {
            if(!threeScene || !threeParticlesMat) return;
            if(isDark) {
                threeScene.fog.color.setHex(0x0a0a0a);
                threeParticlesMat.color.setHex(0xD4AF37);
                threeParticlesMat.opacity = 0.5;
                threePointLight.color.setHex(0xD4AF37);
            } else {
                threeScene.fog.color.setHex(0xF5F5DC);
                threeParticlesMat.color.setHex(0x8B5A2B);
                threeParticlesMat.opacity = 0.3;
                threePointLight.color.setHex(0x8B5A2B);
            }
        };

        const CustomCursor = () => {
            const cursorRef = useRef(null);
            const dotRef = useRef(null);
            const [isHovering, setIsHovering] = useState(false);
            const { theme } = useContext(ThemeContext);

            useEffect(() => {
                const moveCursor = (e) => {
                    if(cursorRef.current && dotRef.current) {
                        cursorRef.current.style.transform = `translate3d(${e.clientX - 16}px, ${e.clientY - 16}px, 0)`;
                        dotRef.current.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
                    }
                };

                const handleMouseOver = (e) => {
                    const target = e.target;
                    const isClickable = target.closest('a, button, [role="button"], input, textarea, .interactive');
                    setIsHovering(!!isClickable);
                };

                window.addEventListener('mousemove', moveCursor);
                window.addEventListener('mouseover', handleMouseOver);

                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    window.removeEventListener('mouseover', handleMouseOver);
                };
            }, []);

            const cursorColor = theme === 'dark' ? 'border-softGold' : 'border-vintageBrown';
            const dotColor = theme === 'dark' ? 'bg-softGold' : 'bg-vintageBrown';
            const hoverBg = theme === 'dark' ? 'bg-softGold/10' : 'bg-vintageBrown/10';

            return (
                <div className="hidden md:block">
                    <div ref={cursorRef} className={`fixed top-0 left-0 w-8 h-8 rounded-full border pointer-events-none z-[9999] transition-all duration-300 ease-out ${cursorColor} ${isHovering ? `scale-[2.5] ${hoverBg} border-transparent backdrop-blur-[1px]` : 'scale-100'}`} style={{ mixBlendMode: theme==='dark' ? 'difference' : 'normal' }} />
                    <div ref={dotRef} className={`fixed top-0 left-0 w-2 h-2 rounded-full pointer-events-none z-[9999] transition-all duration-150 ${dotColor} ${isHovering ? 'opacity-0 scale-50' : 'opacity-100 scale-100'}`} />
                </div>
            );
        };

        const FloatingControls = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const { theme, toggleTheme } = useContext(ThemeContext);

            const handleToggleAudio = () => {
                const state = audioEngine.toggle();
                setIsPlaying(state);
            };

            return (
                <div className="fixed bottom-8 left-8 z-50 flex flex-col gap-4">
                    <button onClick={handleToggleAudio} className="flex items-center gap-3 group" title="Toggle Ambient Audio">
                        <div className={`relative w-10 h-10 rounded-full border flex items-center justify-center transition-colors ${theme === 'dark' ? 'border-gray-700 group-hover:border-softGold text-gray-400 group-hover:text-softGold' : 'border-gray-300 group-hover:border-vintageBrown text-gray-500 group-hover:text-vintageBrown'}`}>
                            {isPlaying ? (
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                            ) : (
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
                            )}
                            {isPlaying && <div className={`absolute inset-0 rounded-full animate-ping border opacity-40 ${theme === 'dark' ? 'border-softGold' : 'border-vintageBrown'}`}></div>}
                        </div>
                    </button>

                    <button onClick={toggleTheme} className="flex items-center gap-3 group" title="Toggle Theme">
                        <div className={`relative w-10 h-10 rounded-full border flex items-center justify-center transition-colors ${theme === 'dark' ? 'border-gray-700 group-hover:border-softGold text-gray-400 group-hover:text-softGold' : 'border-gray-300 group-hover:border-vintageBrown text-gray-500 group-hover:text-vintageBrown'}`}>
                            {theme === 'dark' ? (
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            ) : (
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                            )}
                        </div>
                    </button>
                </div>
            );
        };

        const SectionHeading = ({ title, subtitle, center = true }) => {
            const { theme } = useContext(ThemeContext);
            const subtitleColor = theme === 'dark' ? 'text-softGold drop-shadow-[0_0_10px_rgba(212,175,55,0.3)]' : 'text-vintageBrown';
            const titleColor = theme === 'dark' ? 'text-cream' : 'text-darkCharcoal';
            const lineColor = theme === 'dark' ? 'via-softGold' : 'via-vintageBrown';

            return (
                <div className={`mb-20 flex flex-col ${center ? 'items-center text-center' : 'items-start text-left'}`}>
                    <motion.span 
                        initial={{ opacity: 0, y: 15 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true, margin: "-100px" }}
                        className={`uppercase tracking-[0.3em] text-[10px] sm:text-xs font-semibold mb-4 ${subtitleColor}`}
                    >
                        {subtitle}
                    </motion.span>
                    <motion.h2 
                        initial={{ opacity: 0, y: 15 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true, margin: "-100px" }} transition={{ delay: 0.1 }}
                        className={`font-serif text-4xl md:text-5xl lg:text-6xl ${titleColor} leading-tight`}
                    >
                        {title}
                    </motion.h2>
                    <motion.div 
                        initial={{ width: 0, opacity: 0 }} whileInView={{ width: '80px', opacity: 1 }} viewport={{ once: true }} transition={{ duration: 1, delay: 0.3 }}
                        className={`h-px bg-gradient-to-r from-transparent ${lineColor} to-transparent mt-8 ${center ? '' : 'ml-0'}`}
                        style={{ background: center ? undefined : `linear-gradient(to right, ${theme === 'dark' ? '#D4AF37' : '#8B5A2B'}, transparent)` }}
                    />
                </div>
            );
        };

        const LoadingScreen = ({ onComplete }) => {
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                const duration = 2000;
                const interval = 20;
                const steps = duration / interval;
                let currentStep = 0;

                const timer = setInterval(() => {
                    currentStep++;
                    setProgress(Math.min((currentStep / steps) * 100, 100));
                    if(currentStep >= steps) {
                        clearInterval(timer);
                        setTimeout(onComplete, 400); 
                    }
                }, interval);

                return () => clearInterval(timer);
            }, [onComplete]);

            return (
                <motion.div 
                    className="fixed inset-0 z-[1000] bg-dark flex flex-col items-center justify-center"
                    exit={{ opacity: 0, y: '-5%', filter: 'blur(10px)' }}
                    transition={{ duration: 1, ease: [0.76, 0, 0.24, 1] }}
                >
                    <div className="font-serif text-4xl font-bold tracking-widest text-gray-800 flex items-center gap-2 mb-8 relative">
                        <span className="text-gray-700">NH</span><span className="text-sm font-sans tracking-widest font-light ml-3 text-gray-800">CREATIVE</span>
                        <div 
                            className="absolute inset-0 overflow-hidden text-softGold whitespace-nowrap transition-all duration-75"
                            style={{ width: `${progress}%`, clipPath: `inset(0 ${100 - progress}% 0 0)` }}
                        >
                            <span className="text-softGold">NH</span><span className="text-sm font-sans tracking-widest font-light ml-3 text-softGold">CREATIVE</span>
                        </div>
                    </div>
                    
                    <div className="w-64 h-[1px] bg-gray-900 relative overflow-hidden">
                        <div className="absolute top-0 left-0 h-full bg-softGold shadow-[0_0_15px_rgba(212,175,55,1)]" style={{ width: `${progress}%`, transition: 'width 0.1s linear' }} />
                    </div>
                    <div className="mt-6 text-[9px] tracking-[0.4em] text-gray-600 uppercase font-sans font-light">
                        {Math.floor(progress)}% — Initializing Experience
                    </div>
                </motion.div>
            );
        };

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const { theme } = useContext(ThemeContext);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navClass = scrolled ? (theme === 'dark' ? 'glass-dark py-4' : 'glass-light py-4') : 'bg-transparent py-6 md:py-8';
            const linkColor = theme === 'dark' ? 'text-gray-400 hover:text-softGold' : 'text-gray-600 hover:text-vintageBrown';

            return (
                <motion.nav 
                    initial={{ y: -100 }} animate={{ y: 0 }} transition={{ duration: 1, ease: "easeOut", delay: 0.5 }}
                    className={`fixed top-0 w-full z-40 transition-all duration-500 ${navClass}`}
                >
                    <div className="container mx-auto px-6 md:px-12 flex justify-between items-center">
                        <a href="#" className="flex items-center group">
                            <img 
                                src="https://res.cloudinary.com/dsqqutdgv/image/upload/v1776667950/LOGO_NH_mtsgjt.png" 
                                alt="NH Creative Logo" 
                                className="h-8 md:h-10 w-auto object-contain transition-transform duration-500 group-hover:scale-105" 
                            />
                        </a>
                        <div className={`hidden md:flex gap-8 text-[11px] uppercase tracking-[0.2em] font-medium`}>
                            <a href="#about" className={`${linkColor} transition-colors duration-300`}>Story</a>
                            <a href="#portfolio" className={`${linkColor} transition-colors duration-300`}>Work</a>
                            <a href="#services" className={`${linkColor} transition-colors duration-300`}>Expertise</a>
                            <a href="#journal" className={`${linkColor} transition-colors duration-300`}>Journal</a>
                        </div>
                        <div className="flex gap-4">
                            <a href="#contact" className={`px-5 py-2.5 border text-[10px] md:text-xs uppercase tracking-widest transition-all duration-300 interactive ${theme === 'dark' ? 'border-softGold/50 text-softGold hover:bg-softGold hover:text-dark' : 'border-vintageBrown/50 text-vintageBrown hover:bg-vintageBrown hover:text-warmBeige'}`}>
                                Collaborate
                            </a>
                        </div>
                    </div>
                </motion.nav>
            );
        };

        const Hero = () => {

        const IndustrialBackground = () => {
            const containerRef = useRef();

            useEffect(() => {
                if(!containerRef.current) return;
                const scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x050505, 0.02);
                
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
                camera.position.z = 10;
                
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                containerRef.current.appendChild(renderer.domElement);

                const geo = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 0.8, wireframe: true });
                const cubes = [];
                for(let i=0; i<20; i++) {
                    const cube = new THREE.Mesh(geo, mat);
                    cube.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*10 - 5);
                    cube.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                    scene.add(cube);
                    cubes.push(cube);
                }

                const light = new THREE.PointLight(0xb87333, 2, 50); 
                light.position.set(0, 0, 5);
                scene.add(light);
                scene.add(new THREE.AmbientLight(0x222222));

                let mouseX = 0, mouseY = 0;
                const handleMouseMove = (e) => { mouseX = (e.clientX - window.innerWidth/2)*0.01; mouseY = (e.clientY - window.innerHeight/2)*0.01; };
                window.addEventListener('mousemove', handleMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);
                    cubes.forEach((c, i) => { c.rotation.x += 0.002; c.rotation.y += 0.003; c.position.y += Math.sin(Date.now()*0.001 + i)*0.005; });
                    camera.position.x += (mouseX - camera.position.x) * 0.05;
                    camera.position.y += (-mouseY - camera.position.y) * 0.05;
                    camera.lookAt(scene.position);
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', handleResize);
                    containerRef.current?.removeChild(renderer.domElement);
                };
            }, []);

            return <div ref={containerRef} className="absolute inset-0 z-0 pointer-events-none opacity-40"></div>;

                                <span className="sm:hidden">Open</span>
                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </a>
                        </div>
                    </nav>
                    
                    <div className="flex-1 w-full bg-[#050505] overflow-hidden flex justify-center items-center relative py-4">
                        <div className={`relative bg-white overflow-hidden transition-all duration-500 ease-in-out flex items-center justify-center ${getViewportStyles()}`}>
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-[#0a0a0a] z-0 pointer-events-none">
                                <div className="w-8 h-8 border-2 border-rose-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-xs tracking-widest uppercase text-gray-500 font-sans">Connecting...</p>
                            </div>
                            <iframe src="https://nhvitation.com" className="w-full h-full border-0 relative z-10 bg-white" title="NHVitation Interactive Preview" sandbox="allow-scripts allow-same-origin allow-forms" />
                        </div>
                    </div>
                </motion.div>
            );
        };

        const App = () => {
            const [isLoading, setIsLoading] = useState(true);
            const [theme, setTheme] = useState('dark');
            const [currentRoute, setCurrentRoute] = useState('home');
            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30, restDelta: 0.001 });

            useEffect(() => {
                initThreeJS();
                console.log("%c NH Creative | Premium Architecture Initialized ", "background: #D4AF37; color: #0a0a0a; font-size: 14px; font-weight: bold; padding: 4px;");
            }, []);

            const toggleTheme = useCallback(() => {
                setTheme(prev => {
                    const newTheme = prev === 'dark' ? 'light' : 'dark';
                    if(newTheme === 'light') {
                        document.documentElement.classList.add('light');
                        document.documentElement.classList.remove('dark');
                    } else {
                        document.documentElement.classList.add('dark');
                        document.documentElement.classList.remove('light');
                    }
                    updateThreeTheme(newTheme === 'dark');
                    return newTheme;
                });
            }, []);

            return (
                <ThemeContext.Provider value={{ theme, toggleTheme }}>
                    <div className="relative z-10 font-sans">
                        <AnimatePresence mode="wait">
                            {isLoading && <LoadingScreen key="loading" onComplete={() => setIsLoading(false)} />}
                            
                            {!isLoading && currentRoute === 'pixelhive' && (
                                <motion.div key="pixelhive-route" initial={{ opacity: 0, scale: 1.1, filter: 'blur(20px)' }} animate={{ opacity: 1, scale: 1, filter: 'blur(0px)' }} exit={{ opacity: 0, scale: 0.9, filter: 'blur(10px)' }} transition={{ duration: 1.2, ease: [0.76, 0, 0.24, 1] }} className="absolute inset-0 z-50 bg-[#0a0a0a]">
                                    <PixelHiveExperience onBack={() => { window.scrollTo(0,0); setCurrentRoute('home'); }} />
                                </motion.div>
                            )}

                            {!isLoading && currentRoute === 'nhvitation' && (
                                <motion.div key="nhvitation-route" className="absolute inset-0 z-50 bg-[#0a0a0a]">
                                    <NHVitationPreview onBack={() => { window.scrollTo(0,0); setCurrentRoute('home'); }} />
                                </motion.div>
                            )}

                            {!isLoading && currentRoute === 'home' && (
                                <motion.div key="home-route" initial={{ opacity: 0, scale: 1.05, filter: 'blur(10px)' }} animate={{ opacity: 1, scale: 1, filter: 'blur(0px)' }} exit={{ opacity: 0, scale: 0.95, filter: 'blur(10px)' }} transition={{ duration: 1.2, ease: [0.76, 0, 0.24, 1] }} className="relative w-full h-full">
                                    <CustomCursor />
                                    <FloatingControls />
                                    <AIAssistant />
                                    <motion.div className={`fixed top-0 left-0 right-0 h-[3px] origin-left z-[60] ${theme==='dark'?'bg-softGold mix-blend-difference':'bg-vintageBrown'}`} style={{ scaleX }} />
                                    <Navbar />
                                    <main>
                                        <Hero />
                                        <About />
                                        <Process />
                                        <Ecosystem onNavigate={setCurrentRoute} />
                                        <PremiumServices onNavigate={setCurrentRoute} />
                                        <TrustAndSecurity />
                                        <ClientSupport />
                                        <Portfolio />
                                        <Testimonials />
                                        <Achievements />
                                        <CreativeJournal />
                                        <Collaboration />
                                    </main>
                                    <Footer />
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </ThemeContext.Provider>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
